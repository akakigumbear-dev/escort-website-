# Nginx config for frontend (elitescort.fun)

server {
    listen 80;
    listen [::]:80;
    server_name elitescort.fun www.elitescort.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name elitescort.fun www.elitescort.fun;

    ssl_certificate /etc/letsencrypt/live/elitescort.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elitescort.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets: aggressive caching (hashed filenames from Vite)
    location ~* ^/assets/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # robots.txt and sitemap.xml: short cache
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA: all other routes go to the frontend container
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Gzip
        gzip on;
        gzip_types text/html text/css application/javascript application/json image/svg+xml;
        gzip_min_length 256;
    }
}
