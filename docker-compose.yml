# Docker Compose for the full stack — all values come from .env
# Prod: docker compose up -d --build                          (reads .env)
# Dev:  docker compose --env-file .env.example up -d --build  (local overrides)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Expose on all interfaces so TablePlus can connect to server IP. Restrict with: ufw delete allow 5432/tcp && ufw allow from YOUR_IP to any port 5432 && ufw reload
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./escort-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      OXAPAY_MERCHANT_KEY: ${OXAPAY_MERCHANT_KEY}
    volumes:
      - ./escort-backend/uploads:/app/uploads
    ports:
      - "127.0.0.1:3000:3000"

  frontend:
    build:
      context: ./velvet-escapes
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"

volumes:
  pgdata:
