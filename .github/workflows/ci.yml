name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (escort-backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: escort-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: escort-backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Install dependencies (fallback)
        if: failure()
        run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
